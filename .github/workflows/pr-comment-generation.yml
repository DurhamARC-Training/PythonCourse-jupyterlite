name: PR Deployment Comment

on:
  workflow_call:

jobs:
  add-deploy-comment:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write 
    steps:
      - name: Comment PR with Deployment Link
        uses: actions/github-script@v7
        with:
          script: |
            // Grab the branch name from the PR payload
            const branchName = context.payload.pull_request.head.ref;
            
            // Sanitize branch name (replace / with -) exactly like deploy-jupyterlite.yml does
            const safeBranchName = branchName.replace(/\//g, '-');
            
            // Dynamically grab the owner and repo name from the caller repository
            // Note: owner is lowercased because GitHub Pages domains are case-insensitive,
            // whereas the repository name in the path is case-sensitive, so we keep its casing.
            const owner = context.repo.owner.toLowerCase(); 
            const repo = context.repo.repo;                 
            
            // Construct the dynamic deployment URL
            const deployUrl = `https://${owner}.github.io/${repo}/branch/${safeBranchName}`;
            // Format the professional comment text
            const commentBody = `**JupyterLite Preview**\n\nA viewable version of this branch is being built and will be available shortly. You can review the changes at the following link once it is ready:\n[${deployUrl}](${deployUrl})`;
            
            // Create the comment on the PR
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });